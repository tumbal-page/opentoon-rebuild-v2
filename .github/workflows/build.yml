name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/opentoon-release.keystore

      - name: Build APK with Gradle (Signed)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -Pandroid.keyAlias=opentoon \
            -Pandroid.storeFile=opentoon-release.keystore

      - name: Build APK with Gradle (Unsigned)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentoon-rebuild-v2.apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
